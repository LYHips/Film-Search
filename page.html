<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Відкрити UA Kinogo</title>
  <style>
    body {
      background-color: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    button {
      background-color: #ffcc00;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #ffaa00;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <button onclick="window.open('https://uakinogo.io/', '_blank')">
    🎬 Відкрити UA Kinogo
  </button>
</body>
</html>
